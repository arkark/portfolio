language: node_js
node_js:
  - "node"
  - "10"
  - "11"
script:
  - yarn lint
  - yarn build

deploy:
  provider: pages
  skip-cleanup: true
  local_dir: dist
  target-branch: master
  github-token: $GITHUB_TOKEN  # Set in the settings page of your repository, as a secure variable
  keep-history: true
  on:
    branch: develop
    node: "node"
